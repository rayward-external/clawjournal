name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest tests/ -v

  windows-selfupdate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -e ".[dev]"
      - run: >-
          python -m pytest
          tests/test_selfupdate.py
          tests/test_install_scripts.py
          tests/workbench/test_update_restart.py
          -v

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install --upgrade pip "setuptools>=77.0" wheel
      - working-directory: clawjournal/web/frontend
        run: |
          npm ci
          npm run build
      - run: test -f clawjournal/web/frontend/dist/index.html
      - run: python -m pip wheel . --no-deps --no-build-isolation -w /tmp/clawjournal-wheelcheck
      - name: Verify wheel contains frontend assets
        run: |
          wheel_file=$(ls /tmp/clawjournal-wheelcheck/clawjournal-*.whl)
          python -m zipfile -l "$wheel_file" | grep -q 'web/frontend/dist/index.html' \
            || { echo "wheel missing frontend assets: $wheel_file"; exit 1; }
      - run: python -m pip install -e .
